name: Publish tray-hook

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish-binaries:
    runs-on: ${{ matrix.settings.os }}
    permissions:
      id-token: write # Required for npm provenance attestation
    strategy:
      # If one platform fails, don't cancel the others
      fail-fast: false
      matrix:
        settings:
          # --- WINDOWS ---
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm_dir: tray-hook-win32-x64
            binary_name: tray-hook.exe

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            npm_dir: tray-hook-win32-arm64
            binary_name: tray-hook.exe

          # --- MACOS ---
          - os: macos-latest
            target: x86_64-apple-darwin
            npm_dir: tray-hook-darwin-x64
            binary_name: tray-hook

          - os: macos-latest
            target: aarch64-apple-darwin
            npm_dir: tray-hook-darwin-arm64
            binary_name: tray-hook

          # --- LINUX ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_dir: tray-hook-linux-x64
            binary_name: tray-hook

          # GitHub provides free native ARM runners for public repos —
          # avoids the GTK cross-compilation nightmare entirely.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            npm_dir: tray-hook-linux-arm64
            binary_name: tray-hook

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      # Provides the ARM64 cross-linker (amd64_arm64) for MSVC.
      # Without this, cargo can find the Rust target but not the linker.
      - name: Install MSVC ARM64 cross-compiler
        if: matrix.settings.target == 'aarch64-pc-windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      # We use contains() so this runs on both ubuntu-latest AND ubuntu-24.04-arm
      - name: Install Linux dependencies
        if: contains(matrix.settings.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.settings.target }}

      - name: Copy binary to npm package folder
        shell: bash
        run: cp target/${{ matrix.settings.target }}/release/${{ matrix.settings.binary_name }} npm/${{ matrix.settings.npm_dir }}/

      # Stamp the version from the git tag (e.g. v1.2.0 → 1.2.0) so that
      # the published package always matches the tag regardless of what is
      # checked into package.json.
      - name: Set version from tag
        shell: bash
        working-directory: npm/${{ matrix.settings.npm_dir }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Publish, but treat "already published" as a non-fatal condition so
      # that re-running a partially failed workflow doesn't hard-fail on the
      # platforms that already succeeded.
      - name: Publish platform package
        shell: bash
        working-directory: npm/${{ matrix.settings.npm_dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          OUTPUT=$(npm publish --access public --provenance 2>&1) && echo "$OUTPUT" && exit 0
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qiE "already exists|previously published|cannot publish over" && exit 0
          exit 1

  publish-main-package:
    needs: build-and-publish-binaries
    # Only proceed if every matrix entry either succeeded or was already published.
    # Cancellations and genuine failures block the main package from going out.
    if: ${{ !contains(needs.build-and-publish-binaries.result, 'failure') && !contains(needs.build-and-publish-binaries.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Stamp the main package version AND align all optionalDependencies to
      # the same version so consumers always resolve the correct platform binaries.
      - name: Set version from tag
        working-directory: npm/tray-hook
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(pkg.optionalDependencies ?? {})) {
              pkg.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish main package
        working-directory: npm/tray-hook
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance